<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kontak Kami | Khusni Clothing</title>

<meta name="description" content="Hubungi Khusni Clothing untuk pertanyaan, pemesanan, atau kerjasama.">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="icon" href="/favicon.png">

<style>

:root{
--primary:#6366f1;
--primary2:#4f46e5;
--bg:#0b1120;
--card:#0f172a;
--text:#e2e8f0;
--border:#1e293b;
--shadow:0 15px 35px rgba(0,0,0,0.35);
}

[data-theme="light"]{
--bg:#f8fafc;
--card:#ffffff;
--text:#1e293b;
--border:#e2e8f0;
--shadow:0 10px 25px rgba(0,0,0,0.08);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:var(--bg);
color:var(--text);
line-height:1.6;
}

/* HEADER */

header{
background:var(--card);
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:1000;
box-shadow:var(--shadow);
}

.logo img{
height:50px;
}

.toggle-darkmode{
background:none;
border:none;
font-size:20px;
cursor:pointer;
color:var(--primary);
}

/* CONTAINER */

.container{
max-width:1100px;
margin:auto;
padding:60px 20px;
}

/* TITLE */

h1{
text-align:center;
color:var(--primary);
margin-bottom:40px;
font-size:32px;
}

/* GRID */

.contact-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

@media(max-width:768px){
.contact-grid{
grid-template-columns:1fr;
}
}

/* CARD */

.contact-info,
.contact-form{
background:var(--card);
padding:30px;
border-radius:16px;
box-shadow:var(--shadow);
border:1px solid var(--border);
transition:.3s;
}

.contact-info:hover,
.contact-form:hover{
transform:translateY(-5px);
}

/* CARD TITLE */

.contact-info h2,
.contact-form h2{
font-size:22px;
margin-bottom:20px;
color:var(--primary);
}

/* INFO */

.info-item{
display:flex;
align-items:center;
gap:12px;
margin-bottom:15px;
}

.info-item i{
font-size:18px;
color:var(--primary);
}

.info-item a{
text-decoration:none;
color:var(--text);
}

.info-item a:hover{
color:var(--primary);
}

/* FORM */

.contact-form input,
.contact-form textarea{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:10px;
border:1px solid var(--border);
background:transparent;
color:var(--text);
font-family:inherit;
}

.contact-form input:focus,
.contact-form textarea:focus{
outline:none;
border-color:var(--primary);
}

/* BUTTON */

.contact-form button{
background:var(--primary);
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
font-weight:600;
transition:.3s;
display:flex;
align-items:center;
gap:8px;
}

.contact-form button:hover{
background:var(--primary2);
transform:scale(1.05);
}

/* MAP */

iframe{
width:100%;
height:250px;
border:0;
border-radius:14px;
margin-top:20px;
}

/* FOOTER */

footer{
text-align:center;
padding:30px;
font-size:14px;
opacity:.8;
}

</style>

</head>
<body>

<header>

<div class="logo">
<a href="https://waysmodzzsite.my.id">
<img src="/ksclothing.webp" alt="Logo" loading="lazy">
</a>
</div>

<button onclick="toggleDarkMode()" class="toggle-darkmode">
🌓
</button>

</header>

<main class="container" data-aos="fade-up">

<h1>
<i class="fas fa-headset"></i> Kontak Khusni
</h1>

<div class="contact-grid">

<section class="contact-info">

<h2>Hubungi Kami</h2>

<div class="info-item">
<i class="fas fa-map-marker-alt"></i>
<span>Jl. Cieurih parapatan blok jum'at</span>
</div>

<div class="info-item">
<i class="fab fa-whatsapp"></i>
<a href="https://wa.me/6285719607325" target="_blank">
+62 857-1960-7325
</a>
</div>

<div class="info-item">
<i class="fas fa-envelope"></i>
<a href="mailto:khusniclothing@gmail.com">
khusniclothing@gmail.com
</a>
</div>

<div class="info-item">
<i class="fab fa-instagram"></i>
<a href="https://instagram.com/khusniseken_" target="_blank">
@khusniseken
</a>
</div>

<iframe src="https://www.google.com/maps?q=majalengka&output=embed" loading="lazy"></iframe>

</section>

<section class="contact-form">

<h2>Kirim Pesan</h2>

<form action="#" method="POST">

<input type="text" name="nama" placeholder="Nama Anda" required>

<input type="email" name="email" placeholder="Email Anda" required>

<textarea name="pesan" rows="5" placeholder="Tulis pesan Anda..." required></textarea>

<button type="submit">
<i class="fas fa-paper-plane"></i> Kirim
</button>

</form>

</section>

</div>

</main>

<footer>

<i class="fa-regular fa-copyright"></i>
2025 Khusni Clothing. Seluruh hak cipta dilindungi.

</footer>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>

AOS.init({
duration:900,
once:true
});

function toggleDarkMode(){

const theme=document.documentElement.getAttribute('data-theme');

document.documentElement.setAttribute(
'data-theme',
theme==='dark'?'light':'dark'
);

}

</script>

</body>
  </html>
